[pipeline]
##### Model
# Use a mode to specify whether to rank items or use pre-ranked items
model_action = false  
# Options: true to run / false to use_precomputed
model_ranked_items_path = ./experiment_nemig_lstur_results/LSTUR
# Path for loading/saving pre-ranked items
model_eval_action = false
model_eval_result_path = experiment_nemig_lstur_results
##### Static Reranker
static_reranking_action = true  
# Options:  true to run /false to use_precomputed
static_reranked_items_path = experiment_nemig_lstur_results
static_eval_action = true
# Path for loading/saving pre-reranked items
static_eval_result_path = experiment_nemig_lstur_results/static_reranked
##### Dynamic Reranker
dynamic_reranking_action = true  
# Options:  true to run / false to use_precomputed
dynamic_reranked_items_path = experiment_nemig_lstur_results
dynamic_eval_action = true
# Path for loading/saving pre-reranked items
dynamic_eval_result_path = experiment_nemig_lstur_results/dynamic_reranked

# Optional Data split section
; [data]
; dataset_path =  ./experiment_nemig_lstur_results
